<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Qwen3VL Video Processing Pipeline — Animated Walkthrough</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1923; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }

  #container { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
  #svg-wrap {
    transform-origin: 0 0;
    transition: transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    will-change: transform;
  }

  /* Progress bar */
  #progress {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #4a7abf, #63b3ed);
    transition: width 1.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    z-index: 200; border-radius: 0 2px 2px 0;
  }

  /* Step info overlay */
  #step-info {
    position: fixed; top: 24px; left: 24px; z-index: 200;
    transition: opacity 0.6s ease;
    background: rgba(10, 15, 25, 0.82); backdrop-filter: blur(12px);
    padding: 16px 22px; border-radius: 12px;
    border: 1px solid rgba(99, 179, 237, 0.15);
    max-width: 580px;
  }
  #step-number {
    font-size: 18px; color: #63b3ed; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  #step-title {
    font-size: 32px; color: #e2e8f0; font-weight: 700;
    margin-bottom: 8px; line-height: 1.2;
  }
  #step-desc {
    font-size: 18px; color: #a0aec0; max-width: 550px; line-height: 1.6;
  }

  /* Step counter */
  #step-counter {
    position: fixed; top: 24px; right: 24px; z-index: 200;
    font-size: 20px; color: #63b3ed; font-weight: 600;
    font-family: 'Courier New', monospace;
  }

  /* Controls */
  #controls {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; gap: 8px; align-items: center;
    background: rgba(15, 25, 35, 0.85); backdrop-filter: blur(12px);
    padding: 8px 16px; border-radius: 12px;
    border: 1px solid rgba(99, 179, 237, 0.2);
  }
  #controls button {
    padding: 8px 14px; border: none; border-radius: 8px;
    background: rgba(99, 179, 237, 0.12); color: #e2e8f0;
    cursor: pointer; font-size: 13px; font-weight: 600;
    transition: background 0.2s, transform 0.1s;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #controls button:hover { background: rgba(99, 179, 237, 0.25); }
  #controls button:active { transform: scale(0.96); }
  #controls button.active { background: rgba(99, 179, 237, 0.35); }

  /* Step dots */
  #dots {
    display: flex; gap: 6px; margin: 0 12px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(99, 179, 237, 0.2); cursor: pointer;
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: #63b3ed; transform: scale(1.3); }
  .dot:hover { background: rgba(99, 179, 237, 0.5); }

  /* Keyboard hint */
  #hint {
    position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #4a5568; z-index: 200;
    opacity: 1; transition: opacity 2s ease;
  }

  /* Fade transitions for step info */
  .fade-out { opacity: 0 !important; }
  .fade-in { opacity: 1 !important; }
</style>
</head>
<body>

<div id="progress" style="width: 0"></div>

<div id="step-info">
  <div id="step-number"></div>
  <div id="step-title"></div>
  <div id="step-desc"></div>
</div>

<div id="step-counter"></div>

<div id="container">
  <div id="svg-wrap"></div>
</div>

<div id="controls">
  <button onclick="prevStep()" title="Previous (←)">&#9664; Prev</button>
  <button onclick="togglePlay()" id="play-btn" title="Play/Pause (Space)">&#9646;&#9646; Pause</button>
  <div id="dots"></div>
  <button onclick="nextStep()" title="Next (→)">Next &#9654;</button>
  <button onclick="resetAnim()" title="Reset (R)">&#8634; Reset</button>

    style="width:48px; padding:6px 4px; border:1px solid rgba(99,179,237,0.3);

    font-size:13px; text-align:center; font-family:'Courier New',monospace;"

  <span style="color:#a0aec0; font-size:13px;">s</span>
  <button onclick="toggleMode()" id="mode-btn" title="Toggle step/scroll mode (M)"
    style="margin-left:4px;">Step</button>
  <span style="color:#a0aec0; font-size:13px; margin-left:8px;">Zoom</span>

    style="width:180px; accent-color:#63b3ed; vertical-align:middle;"
    title="Zoom multiplier" oninput="updateZoom()">

  if (playing) { clearTimeout(timer); scheduleNext(); }
}
function updateZoom() {
  document.getElementById('zoom-label').textContent = getZoomMul().toFixed(1) + 'x';

steps[0].scale = Math.min(window.innerWidth / SVG_W, window.innerHeight / SVG_H) * 0.92;
steps[0].y = SVG_H / 2;
goToStep(0);
scheduleNext();

function goToStep(idx) {
  currentStep = idx;
  const step = steps[idx];
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = step.scale * getZoomMul();

  // Center viewport on step's y position
  const tx = (vw / 2) - (SVG_W / 2 * scale);
  const ty = (vh / 2) - (step.y * scale);

  wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;

  // Update info overlay with fade
  const info = document.getElementById('step-info');
  info.classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('step-number').textContent = step.number;
    document.getElementById('step-title').textContent = step.title;
    document.getElementById('step-desc').textContent = step.desc;
    info.classList.remove('fade-out');
  }, 300);

  // Update counter
  document.getElementById('step-counter').textContent =
    idx === 0 ? '' : `${idx} / ${steps.length - 1}`;

  // Update progress bar
  document.getElementById('progress').style.width =
    `${(idx / (steps.length - 1)) * 100}%`;

  // Update dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  // Hide hint after first interaction
  if (idx > 0) {
    document.getElementById('hint').style.opacity = '0';
  }
}

function scheduleNext() {
  clearTimeout(timer);
  if (!playing) return;
  timer = setTimeout(() => {
    if (currentStep < steps.length - 1) {
      goToStep(currentStep + 1);
      scheduleNext();
    } else {
      playing = false;
      document.getElementById('play-btn').innerHTML = '&#9654; Play';
    }
  }, getHoldMs());
}

function nextStep() {
  clearTimeout(timer);
  if (currentStep < steps.length - 1) goToStep(currentStep + 1);
  if (playing) scheduleNext();
}

function prevStep() {
  clearTimeout(timer);
  if (currentStep > 0) goToStep(currentStep - 1);
  if (playing) scheduleNext();
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').innerHTML =
    playing ? '&#9646;&#9646; Pause' : '&#9654; Play';
  if (playing) scheduleNext();
  else clearTimeout(timer);
}

function resetAnim() {
  clearTimeout(timer);
  playing = true;
  document.getElementById('play-btn').innerHTML = '&#9646;&#9646; Pause';
  goToStep(0);
  scheduleNext();
}

// ── Mode: "step" (snap to steps) vs "scroll" (continuous pan) ──
let mode = 'step';  // 'step' or 'scroll'
let scrollY = 0;    // current viewport center-y in continuous mode
let scrollScale = 1.0; // current scale in continuous mode
let wheelCooldown = false;

function toggleMode() {
  mode = mode === 'step' ? 'scroll' : 'step';
  document.getElementById('mode-btn').textContent = mode === 'step' ? 'Step' : 'Scroll';
  if (mode === 'scroll') {
    // Enter continuous mode at current step's position
    clearTimeout(timer);
    playing = false;
    document.getElementById('play-btn').innerHTML = '&#9654; Play';
    const step = steps[currentStep];
    scrollY = step.y;
    scrollScale = step.scale * getZoomMul();
    // Use faster transition for smooth scrolling
    wrap.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1)';
    applyContinuousView();
  } else {
    // Return to step mode, snap to nearest step
    wrap.style.transition = 'transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1)';
    const nearest = findNearestStep(scrollY);
    goToStep(nearest);
  }
}

function applyContinuousView() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const tx = (vw / 2) - (SVG_W / 2 * scrollScale);
  const ty = (vh / 2) - (scrollY * scrollScale);
  wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scrollScale})`;

  // Update step info to nearest step
  const nearest = findNearestStep(scrollY);
  if (nearest !== currentStep) {
    currentStep = nearest;
    const step = steps[nearest];
    document.getElementById('step-number').textContent = step.number;
    document.getElementById('step-title').textContent = step.title;
    document.getElementById('step-desc').textContent = step.desc;
    document.getElementById('step-counter').textContent =
      nearest === 0 ? '' : `${nearest} / ${steps.length - 1}`;
    document.getElementById('progress').style.width =
      `${(nearest / (steps.length - 1)) * 100}%`;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === nearest);
    });
  }
}

function findNearestStep(y) {
  let best = 0, bestDist = Infinity;
  for (let i = 0; i < steps.length; i++) {
    const dist = Math.abs(steps[i].y - y);
    if (dist < bestDist) { bestDist = dist; best = i; }
  }
  return best;
}

// Mouse wheel handling
container.addEventListener('wheel', e => {
  e.preventDefault();
  document.getElementById('hint').style.opacity = '0';

  if (mode === 'scroll') {
    // Continuous scroll: pan viewport smoothly
    const scrollSpeed = 80;
    scrollY += (e.deltaY > 0 ? scrollSpeed : -scrollSpeed);
    scrollY = Math.max(0, Math.min(SVG_H, scrollY));
    applyContinuousView();
  } else {
    // Step mode: scroll to prev/next step with cooldown
    if (wheelCooldown) return;
    wheelCooldown = true;
    setTimeout(() => { wheelCooldown = false; }, 600);
    if (e.deltaY > 0) nextStep();
    else prevStep();
  }
}, { passive: false });

// Keyboard controls
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextStep(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevStep(); }
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'r' || e.key === 'R') { resetAnim(); }
  else if (e.key === 'm' || e.key === 'M') { toggleMode(); }
  else if (e.key >= '0' && e.key <= '7') {
    const idx = parseInt(e.key);
    if (idx < steps.length) { clearTimeout(timer); goToStep(idx); if (playing) scheduleNext(); }
  }
});

// ── Mouse drag to pan ──
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragBaseScrollY = 0;
let dragBaseTx = 0, dragBaseTy = 0;

container.addEventListener('mousedown', e => {
  if (e.button !== 0) return; // left button only
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;

  if (mode === 'scroll') {
    dragBaseScrollY = scrollY;
  } else {
    // Pause auto-play while dragging in step mode
    clearTimeout(timer);
  }

  // Disable smooth transition while dragging
  wrap.style.transition = 'none';
  container.style.cursor = 'grabbing';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;

  if (mode === 'scroll') {
    scrollY = dragBaseScrollY - dy / scrollScale;
    scrollY = Math.max(0, Math.min(SVG_H, scrollY));
    applyContinuousView();
  } else {
    // In step mode: direct translate offset
    const step = steps[currentStep];
    const scale = step.scale * getZoomMul();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const baseTx = (vw / 2) - (SVG_W / 2 * scale);
    const baseTy = (vh / 2) - (step.y * scale);
    wrap.style.transform = `translate(${baseTx + dx}px, ${baseTy + dy}px) scale(${scale})`;
  }
});

document.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  container.style.cursor = '';

  // Restore transition
  if (mode === 'scroll') {
    wrap.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1)';
  } else {
    wrap.style.transition = 'transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1)';
    if (playing) scheduleNext();
  }
});

// Handle window resize
window.addEventListener('resize', () => {
  steps[0].scale = Math.min(window.innerWidth / SVG_W, window.innerHeight / SVG_H) * 0.92;
  if (mode === 'scroll') applyContinuousView();
  else goToStep(currentStep);
});
</script>
