<title>Qwen3-VL SFT Pipeline — v8 Dark Interactive</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0c1219;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
    color: #e2e8f0;
  }

  /* ── Subtle grid background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.04) 0%, transparent 60%);
  }

  /* ── Top bar ── */
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 300;
    background: rgba(12, 18, 25, 0.94);
    backdrop-filter: blur(20px) saturate(1.2);
    border-bottom: 1px solid rgba(99,179,237,0.08);
    padding: 10px 20px 14px;
  }
  #top-title {
    font-size: 14px; color: #94a3b8; font-weight: 600;
    text-align: center; margin-bottom: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  #top-title span { color: #63b3ed; }

  #ov-flow {
    display: flex; align-items: center; justify-content: center;
    gap: 4px;
  }
  .ov-box {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
    min-width: 105px; height: 52px; padding: 4px 10px;
    border: 1.8px solid; border-radius: 10px;
    background: transparent;
    cursor: pointer; position: relative;
    transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .ov-box:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
  .ov-box.active {
    background: color-mix(in srgb, var(--c) 18%, transparent);
    border-color: var(--c) !important;
    border-width: 2.5px;
    box-shadow: 0 0 24px color-mix(in srgb, var(--c) 45%, transparent),
                0 0 48px color-mix(in srgb, var(--c) 20%, transparent),
                inset 0 0 16px color-mix(in srgb, var(--c) 8%, transparent);
    transform: translateY(-3px) scale(1.12);
  }
  .ov-box.active .ov-label {
    filter: brightness(1.5);
  }
  .ov-box.active .ov-num {
    background: var(--c) !important;
    color: #fff !important;
  }
  .ov-num {
    position: absolute; top: 2px; left: 4px;
    font-size: 7px; font-weight: 800; font-family: monospace;
    padding: 1px 4px; border-radius: 4px; line-height: 1.3;
    transition: all 0.4s ease;
  }
  .ov-label {
    font-size: 10px; font-weight: 700; line-height: 1.2;
    display: flex; flex-direction: column; align-items: center;
    transition: filter 0.4s ease;
  }
  .ov-sep {
    color: #2a3a4a; font-size: 16px; user-select: none;
    transform: scaleX(0.6);
  }

  /* ── Container ── */
  #container { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
  #svg-wrap {
    transform-origin: 0 0;
    transition: transform 1.6s cubic-bezier(0.22, 0.68, 0.35, 1.0);
    will-change: transform;
  }

  /* ── Progress ── */
  #progress {
    position: fixed; top: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
    transition: width 1.6s cubic-bezier(0.22, 0.68, 0.35, 1.0);
    z-index: 400; border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px rgba(59,130,246,0.4);
  }

  /* ── Step info ── */
  #step-info {
    position: fixed; top: 120px; left: 20px; z-index: 200;
    transition: opacity 0.4s ease, transform 0.4s ease;
    background: rgba(12, 18, 25, 0.85);
    backdrop-filter: blur(16px) saturate(1.2);
    padding: 16px 22px; border-radius: 14px;
    border: 1px solid rgba(99,179,237,0.1);
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  #step-info.fade-out { opacity: 0; transform: translateY(-8px); }
  #step-number {
    font-size: 11px; color: #8b5cf6; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px;
  }
  #step-title {
    font-size: 22px; color: #f1f5f9; font-weight: 700;
    margin-bottom: 6px; line-height: 1.15;
  }
  #step-desc {
    font-size: 13px; color: #94a3b8; max-width: 400px; line-height: 1.5;
  }

  /* ── Counter ── */
  #step-counter {
    position: fixed; top: 120px; right: 20px; z-index: 200;
    font-size: 16px; color: #475569; font-weight: 600;
    font-family: 'Courier New', monospace;
  }

  /* ── Controls ── */
  #controls {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; gap: 5px; align-items: center;
    background: rgba(12, 18, 25, 0.9);
    backdrop-filter: blur(16px);
    padding: 6px 14px; border-radius: 14px;
    border: 1px solid rgba(99,179,237,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  #controls button {
    padding: 6px 11px; border: none; border-radius: 7px;
    background: rgba(99,179,237,0.08); color: #cbd5e1;
    cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  #controls button:hover { background: rgba(99,179,237,0.18); color: #f1f5f9; }
  #controls button:active { transform: scale(0.96); }

  #dots { display: flex; gap: 4px; margin: 0 8px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(99,179,237,0.15); cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active { background: #3b82f6; transform: scale(1.4); box-shadow: 0 0 6px rgba(59,130,246,0.5); }
  .dot:hover { background: rgba(99,179,237,0.4); }

  #hint {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: #334155; z-index: 200;
    opacity: 1; transition: opacity 2s ease;
    letter-spacing: 0.5px;
  }

  .ctrl-label { color: #64748b; font-size: 11px; margin-left: 6px; }
  .ctrl-input {
    width: 42px; padding: 4px 3px; border: 1px solid rgba(99,179,237,0.15);
    border-radius: 6px; background: rgba(99,179,237,0.06); color: #cbd5e1;
    font-size: 11px; text-align: center; font-family: 'Courier New', monospace;
  }
  .ctrl-range {
    width: 120px; accent-color: #3b82f6; vertical-align: middle;
  }

  /* ── Pulse glow on active overview box ── */
  @keyframes glow-pulse {
    0%, 100% {
      box-shadow: 0 0 20px color-mix(in srgb, var(--c) 40%, transparent),
                  0 0 40px color-mix(in srgb, var(--c) 15%, transparent),
                  inset 0 0 12px color-mix(in srgb, var(--c) 6%, transparent);
    }
    50% {
      box-shadow: 0 0 32px color-mix(in srgb, var(--c) 55%, transparent),
                  0 0 60px color-mix(in srgb, var(--c) 25%, transparent),
                  inset 0 0 20px color-mix(in srgb, var(--c) 12%, transparent);
    }
  }
  .ov-box.active { animation: glow-pulse 2s ease-in-out infinite; }

  /* ── Flash transition when switching steps ── */
  @keyframes ov-enter {
    0% { transform: translateY(-3px) scale(1.2); filter: brightness(1.4); }
    100% { transform: translateY(-3px) scale(1.12); filter: brightness(1); }
  }
  .ov-box.entering { animation: ov-enter 0.5s ease-out; }
</style>

// Compute fit scale
steps[0].scale = Math.min(window.innerWidth / SVG_W, (window.innerHeight - TOP_H) / SVG_H) * 0.88;

function highlightOv(idx) {
  document.querySelectorAll('.ov-box').forEach((b, i) => {
    const wasActive = b.classList.contains('active');
    b.classList.toggle('active', i === idx);
    if (i === idx && !wasActive) {
      b.classList.add('entering');
      setTimeout(() => b.classList.remove('entering'), 500);
    }
  });
}

function goToStep(idx) {
  currentStep = idx;
  const s = steps[idx];
  const vw = window.innerWidth, vh = window.innerHeight;
  const sc = s.scale * getZoomMul();
  const tx = (vw / 2) - (SVG_W / 2 * sc);
  const ty = (vh / 2 + TOP_H / 2) - (s.y * sc);
  wrap.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;

  const info = document.getElementById('step-info');
  info.classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('step-number').textContent = s.number;
    document.getElementById('step-title').textContent = s.title;
    document.getElementById('step-desc').textContent = s.desc;
    info.classList.remove('fade-out');
  }, 250);

  document.getElementById('step-counter').textContent =
    idx === 0 ? '' : `${idx} / ${steps.length - 1}`;
  document.getElementById('progress').style.width =
    `${(idx / (steps.length - 1)) * 100}%`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  highlightOv(s.ov_idx);
  if (idx > 0) document.getElementById('hint').style.opacity = '0';
}

function scheduleNext() {
  clearTimeout(timer);
  if (!playing) return;
  timer = setTimeout(() => {
    if (currentStep < steps.length - 1) { goToStep(currentStep + 1); scheduleNext(); }
    else { playing = false; document.getElementById('play-btn').innerHTML = '&#9654;'; }
  }, getHoldMs());
}
function nextStep() { clearTimeout(timer); if (currentStep < steps.length - 1) goToStep(currentStep + 1); if (playing) scheduleNext(); }
function prevStep() { clearTimeout(timer); if (currentStep > 0) goToStep(currentStep - 1); if (playing) scheduleNext(); }
function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) scheduleNext(); else clearTimeout(timer);
}
function resetAnim() {
  clearTimeout(timer); playing = true;
  document.getElementById('play-btn').innerHTML = '&#9646;&#9646;';
  goToStep(0); scheduleNext();
}

// ── Scroll mode ──
let mode = 'step', scrollYPos = 0, scrollScale = 1.0, wheelCooldown = false;
function toggleMode() {
  mode = mode === 'step' ? 'scroll' : 'step';
  document.getElementById('mode-btn').textContent = mode === 'step' ? 'Step' : 'Scroll';
  if (mode === 'scroll') {
    clearTimeout(timer); playing = false;
    document.getElementById('play-btn').innerHTML = '&#9654;';
    scrollYPos = steps[currentStep].y;
    scrollScale = steps[currentStep].scale * getZoomMul();
    wrap.style.transition = 'transform 0.35s cubic-bezier(0.25,0.1,0.25,1)';
    applyContinuousView();
  } else {
    wrap.style.transition = 'transform 1.6s cubic-bezier(0.22,0.68,0.35,1.0)';
    goToStep(findNearestStep(scrollYPos));
  }
}
function applyContinuousView() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const tx = (vw/2) - (SVG_W/2*scrollScale);
  const ty = (vh/2 + TOP_H/2) - (scrollYPos*scrollScale);
  wrap.style.transform = `translate(${tx}px,${ty}px) scale(${scrollScale})`;
  const n = findNearestStep(scrollYPos);
  if (n !== currentStep) {
    currentStep = n; const s = steps[n];
    document.getElementById('step-number').textContent = s.number;
    document.getElementById('step-title').textContent = s.title;
    document.getElementById('step-desc').textContent = s.desc;
    document.getElementById('step-counter').textContent = n === 0 ? '' : `${n} / ${steps.length-1}`;
    document.getElementById('progress').style.width = `${(n/(steps.length-1))*100}%`;
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===n));
    highlightOv(s.ov_idx);
  }
}
function findNearestStep(y) {
  let best=0, bd=Infinity;
  for (let i=0;i<steps.length;i++) { const d=Math.abs(steps[i].y-y); if(d<bd){bd=d;best=i;} }
  return best;
}

container.addEventListener('wheel', e => {
  e.preventDefault();
  document.getElementById('hint').style.opacity = '0';
  if (mode==='scroll') {
    scrollYPos += (e.deltaY>0?80:-80);
    scrollYPos = Math.max(0, Math.min(SVG_H, scrollYPos));
    applyContinuousView();
  } else {
    if (wheelCooldown) return;
    wheelCooldown = true; setTimeout(()=>{wheelCooldown=false;},600);
    if (e.deltaY>0) nextStep(); else prevStep();
  }
}, {passive:false});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') {e.preventDefault(); nextStep();}
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') {e.preventDefault(); prevStep();}
  else if (e.key===' ') {e.preventDefault(); togglePlay();}
  else if (e.key==='r'||e.key==='R') resetAnim();
  else if (e.key==='m'||e.key==='M') toggleMode();
  else if (e.key>='0'&&e.key<='9') {
    const i=parseInt(e.key); if(i<steps.length){clearTimeout(timer);goToStep(i);if(playing)scheduleNext();}
  }
});

// ── Drag ──
let dragging=false, dragSX=0, dragSY=0, dragBaseY=0;
container.addEventListener('mousedown', e => {
  if(e.button!==0) return;
  dragging=true; dragSX=e.clientX; dragSY=e.clientY;
  if(mode==='scroll') dragBaseY=scrollYPos; else clearTimeout(timer);
  wrap.style.transition='none'; container.style.cursor='grabbing'; e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if(!dragging) return;
  const dx=e.clientX-dragSX, dy=e.clientY-dragSY;
  if(mode==='scroll') {
    scrollYPos=dragBaseY-dy/scrollScale;
    scrollYPos=Math.max(0,Math.min(SVG_H,scrollYPos));
    applyContinuousView();
  } else {
    const s=steps[currentStep], sc=s.scale*getZoomMul();
    const vw=window.innerWidth, vh=window.innerHeight;
    const bx=(vw/2)-(SVG_W/2*sc), by=(vh/2+TOP_H/2)-(s.y*sc);
    wrap.style.transform=`translate(${bx+dx}px,${by+dy}px) scale(${sc})`;
  }
});
document.addEventListener('mouseup', () => {
  if(!dragging) return; dragging=false; container.style.cursor='';
  wrap.style.transition = mode==='scroll'
    ? 'transform 0.35s cubic-bezier(0.25,0.1,0.25,1)'
    : 'transform 1.6s cubic-bezier(0.22,0.68,0.35,1.0)';
  if(mode==='step' && playing) scheduleNext();
});

window.addEventListener('resize', () => {
  steps[0].scale = Math.min(window.innerWidth/SVG_W, (window.innerHeight-TOP_H)/SVG_H)*0.88;
  if(mode==='scroll') applyContinuousView(); else goToStep(currentStep);
});

goToStep(0); scheduleNext();
</script>
</body>
</html>
